version: '3.8'
services:
  docdiff-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - docdiff-redis
    restart: unless-stopped

  docdiff-worker:
    build: .
    command: arq app.workers.job_worker.WorkerSettings
    env_file: .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - docdiff-redis
    restart: unless-stopped

  docdiff-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - docdiff-redis-data:/data
    restart: unless-stopped

volumes:
  docdiff-redis-data:
